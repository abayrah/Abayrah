<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABAYRAH | Crafted for Modesty</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="star-logo.png">

    <style>
        /* --- Luxury Design Tokens & Variables --- */
        :root {
            --primary-bg: #FCFBFA;
            --dark-text: #1C1B1A;
            --muted-gray: #7A7571;
            --border-color: #ECEAE6;
            --accent-gold: #C5A880;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--primary-bg);
            color: var(--dark-text);
            font-family: var(--font-sans);
            letter-spacing: 0.5px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Global Styles --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background: radial-gradient(circle at 10% 20%, rgba(243, 239, 233, 0.4) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(197, 168, 128, 0.08) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
            animation: backgroundFlow 15s ease-in-out infinite alternate;
        }

        @keyframes backgroundFlow {
            0% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(-5%, -5%, 0); }
            100% { transform: translate3d(0, 0, 0); }
        }

        a { text-decoration: none; color: inherit; transition: var(--transition-smooth); }

        /* --- Header & Announcement --- */
        .announcement-bar { background-color: var(--dark-text); color: #FFFFFF; text-align: center; padding: 8px 0; font-size: 11px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .main-header { position: sticky; top: 0; background-color: rgba(252, 251, 250, 0.75); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(28, 27, 26, 0.05); z-index: 2000; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1440px; margin: 0 auto; padding: 22px 40px; }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: rgba(28, 27, 26, 0.7); }
        .brand-logo-img { height: 110px; width: auto; }
        .header-actions { display: flex; gap: 28px; }

        /* --- Hero Section --- */
        .hero-section { position: relative; width: 100%; aspect-ratio: 16 / 5; overflow: hidden; background-color: #0D0C0B; }
        .carousel-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.2s ease; background-size: cover; background-position: center; }
        .carousel-slide.active-slide { opacity: 1; }
        .hero-btn { background: transparent; color: #FFFFFF; padding: 14px 40px; text-transform: uppercase; letter-spacing: 4px; border: 1px solid #FFFFFF; cursor: pointer; transition: 0.6s; }
        .hero-btn:hover { background: #FFFFFF; color: var(--dark-text); }

        /* --- Brand Manifest --- */
        .brand-manifest-section { padding: 80px 4%; background: #FFFFFF; }
        .value-pillars-ribbon-row { max-width: 1440px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
        .pillar-number { font-family: var(--font-serif); color: var(--accent-gold); font-size: 24px; }

        /* --- UPDATED PREMIUM CATEGORIES --- */
        .collections-section { max-width: 1440px; margin: 120px auto; padding: 0 40px; }
        .section-header { text-align: center; margin-bottom: 80px; }
        .section-header h2 { font-family: var(--font-serif); font-size: 42px; font-weight: 300; letter-spacing: 6px; text-transform: uppercase; }
        .section-header p { font-size: 13px; color: var(--muted-gray); margin-top: 15px; letter-spacing: 3px; text-transform: uppercase; }

       .category-grid { 
    display: grid; 
    grid-template-columns: repeat(5, 1fr); 
    gap: 20px; 
}
        
        .category-card { 
    position: relative; 
    background-color: #F9F8F6; /* Slightly warmer than primary-bg */
    cursor: pointer; 
    overflow: hidden; 
    display: flex; 
    flex-direction: column; 
    border: 1px solid rgba(0,0,0,0.03); /* Almost invisible border */
    transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

        .img-wrapper { 
    position: relative; 
    width: 100%; 
    aspect-ratio: 3 / 4; 
    overflow: hidden; 
}
       .category-img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.category-content { 
    padding: 30px 20px; 
    text-align: center; 
    background: #FCFBFA;
}

.category-name { 
    font-family: var(--font-serif); 
    font-size: 20px; 
    text-transform: uppercase; 
    letter-spacing: 2px; 
    margin-bottom: 8px; 
    transition: color 0.4s ease;
}

.view-link { 
    font-size: 10px; 
    letter-spacing: 3px; 
    text-transform: uppercase; 
    color: var(--muted-gray); 
    position: relative; 
    transition: all 0.4s ease;
}

/* --- THE "LUXURY" INTERACTION --- */
.category-card:hover { 
    border-color: var(--accent-gold); 
    box-shadow: 0 25px 50px rgba(0,0,0,0.07); 
    transform: translateY(-10px); 
}

.category-card:hover .category-img { 
    transform: scale(1.08); /* Slow, elegant zoom */
}

.category-card:hover .category-name { 
    color: var(--accent-gold); 
}

.category-card:hover .view-link { 
    color: var(--dark-text); 
    border: 1px solid rgba(0,0,0,0.05);
    letter-spacing: 5px; /* Text expands on hover for a premium feel */
}
        /* --- Footer --- */
        .premium-footer { background-color: #1C1B1A; color: #ECEAE6; padding: 80px 40px 30px; margin-top: 120px; }
        .footer-grid { max-width: 1440px; margin: 0 auto; display: grid; grid-template-columns: 2fr repeat(3, 1fr); gap: 60px; }

        @media (max-width: 1024px) { .category-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .category-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="announcement-bar">Complimentary Worldwide Shipping on Orders Over $150</div>

    <header class="main-header">
        <div class="header-container">
            <nav class="nav-links">
                <a href="#home">Home</a>
                <a href="#catalogs" onclick="document.getElementById('catalogs').scrollIntoView({behavior: 'smooth'});">Catalogs</a>
                <a href="#contact" onclick="document.querySelector('.premium-footer').scrollIntoView({behavior: 'smooth'});">Contact</a>
            </nav>
            <div class="brand-identity"><img src="header.png" alt="ABAYRAH Logo" class="brand-logo-img"></div>
            <div class="header-actions">
                <a href="#search"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 5 9.5 7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></a>
                <a href="#cart"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2s.9 2 1.99 2 2-.9 2-2-.9-2-2-2zm-9.83-3.25l.03-.12M1 2h3.27l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1v2z"/></svg></a>
            </div>
        </div>
    </header>

    <section class="hero-section">
        <div class="carousel-track-wrapper" id="heroCarouselTrack">
            <div class="carousel-slide active-slide" style="background-image: url('images/hero-background.png');"></div>
            <div class="carousel-slide" style="background-image: url('images/abaya.png');"></div>
            <div class="carousel-slide" style="background-image: url('images/naqabs.png');"></div>
            <div class="carousel-slide" style="background-image: url('images/hijabs.png');"></div>
            <div class="carousel-slide" style="background-image: url('images/accessiories.png');"></div>
            <div class="carousel-slide" style="background-image: url('images/hampers.png');"></div>
        </div>
        <div class="hero-content-container" id="heroContainer">
            <button class="hero-btn" onclick="document.getElementById('catalogs').scrollIntoView({behavior: 'smooth'});">Explore Collections</button>
        </div>
    </section>

    <section class="collections-section" id="catalogs">
        <div class="section-header">
            <h2>Store Categories</h2>
            <p>Timeless silhouettes engineered with premium fabrics.</p>
        </div>
        <div class="category-grid">
            <div class="category-card" onclick="location.href='#shop-abayas'">
                <div class="img-wrapper"><img src="./images/abaya.png" alt="Luxury Abayas" class="category-img"></div>
                <div class="category-content"><h3 class="category-name">Abayas</h3><span class="view-link">Explore</span></div>
            </div>
            <div class="category-card" onclick="location.href='#shop-niqabs'">
                <div class="img-wrapper"><img src="./images/naqabs.png" alt="Premium Niqabs" class="category-img"></div>
                <div class="category-content"><h3 class="category-name">Niqabs</h3><span class="view-link">Explore</span></div>
            </div>
            <div class="category-card" onclick="location.href='#shop-hijabs'">
                <div class="img-wrapper"><img src="./images/hijabs.png" alt="Essential Hijabs" class="category-img"></div>
                <div class="category-content"><h3 class="category-name">Hijabs</h3><span class="view-link">Explore</span></div>
            </div>
            <div class="category-card" onclick="location.href='#shop-accessories'">
                <div class="img-wrapper"><img src="./images/signature.png" alt="Accessories" class="category-img"></div>
                <div class="category-content"><h3 class="category-name">Accessories</h3><span class="view-link">Explore</span></div>
            </div>
            <div class="category-card" onclick="location.href='#shop-hampers'">
                <div class="img-wrapper"><img src="./images/hampers.png" alt="Hampers" class="category-img"></div>
                <div class="category-content"><h3 class="category-name">Hampers</h3><span class="view-link">Explore</span></div>
            </div>
        </div>
    </section>

    <footer class="premium-footer">
        </footer>

    <script>
        // Existing Carousel and Parallax Logic
        const slides = document.querySelectorAll('.carousel-slide');
        let currentSlideIndex = 0;
        function showTargetSlide(index) {
            slides[currentSlideIndex].classList.remove('active-slide');
            currentSlideIndex = (index + slides.length) % slides.length;
            slides[currentSlideIndex].classList.add('active-slide');
        }
        setInterval(() => showTargetSlide(currentSlideIndex + 1), 5000);
    </script>
</body>
</html>
