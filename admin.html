<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Store Admin Dashboard | ABAYRAH</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="icon" type="image/png" href="star-logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>

        :root {
            --primary-bg: #FFFFFF;
            --dark-text: #1C1B1A;
            --muted-gray: #7A7571;
            --border-color: #ECEAE6;
            --accent-gold: #C5A880;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f8f8f8;
            margin: 0;
            color: var(--dark-text);
        }

        .site-header {
            background: var(--primary-bg);
            padding: 10px 40px;
            border-bottom: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 0.5fr auto 1.5fr;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo-wrapper {
            display: flex;
            justify-content: center;
        }

        .brand-logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
            transform: scale(3.0);
        }

        .admin-nav {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: flex-end;
        }

        .nav-btn {
            background: none;
            border: none;
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 11px;
            cursor: pointer;
            padding-bottom: 5px;
            color: var(--muted-gray);
            transition: 0.3s;
        }

        .nav-btn:hover {
            color: var(--dark-text);
        }

        .nav-btn.active {
            color: var(--dark-text);
            border-bottom: 1px solid var(--dark-text);
            font-weight: 500;
        }

        .logout-btn {
            background-color: transparent;
            color: #e24c4c;
            border: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: underline;
        }

        .admin-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-form-section {
            background: #fff;
            padding: 40px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        select,
        input,
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .inv-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .inv-item.out-of-stock {
            opacity: 0.7;
        }

        .inv-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .inv-img {
            width: 60px;
            height: 80px;
            object-fit: cover;
        }

        .inv-title {
            font-size: 18px;
            margin: 0;
        }

        .inv-price {
            font-size: 12px;
            color: var(--muted-gray);
        }

        .badge-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 9px;
            text-transform: uppercase;
            background: #e9f2ea;
        }

        .catalog-badge {
            background: #f0eee9;
            color: var(--accent-gold);
        }

        .inv-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-delete {
            color: red;
        }

    </style>

</head>

<body>

    <header class="site-header">

        <div></div>

        <div class="brand-logo-wrapper">
            <img src="header.png" alt="ABAYRAH Logo" class="brand-logo-img">
        </div>

        <nav class="admin-nav">
            <button class="nav-btn active">Manage Inventory</button>
        </nav>

    </header>

    <div class="admin-container">

        <div class="admin-form-section">

            <div class="form-group" style="max-width:300px;">

                <label>Filter By Category</label>

                <select id="inventory-category-filter" onchange="filterInventoryByCategory()">

                    <option value="all">All Products</option>

                    <option value="abayas">Abayas</option>

                    <option value="hampers">Hampers</option>

                    <option value="Naqabs">Naqabs</option>

                    <option value="Hijabs">Hijabs</option>

                    <option value="accessories">Accessories</option>

                </select>

            </div>

            <div id="inventory-list" class="inventory-list"></div>

        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

        import {
            getFirestore,
            collection,
            getDocs,
            updateDoc,
            deleteDoc,
            doc
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {

            apiKey: "AIzaSyDxe9DeHRsCzD4vlNsknlDHN0w7txd51ic",

            authDomain: "abayrah-9df21.firebaseapp.com",

            projectId: "abayrah-9df21",

            storageBucket: "abayrah-9df21.firebasestorage.app",

            messagingSenderId: "789725334313",

            appId: "1:789725334313:web:b37408f42add9611730538",

            measurementId: "G-NLJJVVE32M"

        };

        const app = initializeApp(firebaseConfig);

        const db = getFirestore(app);

        window.allProductsData = {};

        window.loadInventory = async function(selectedCategory = "all") {

            const listContainer = document.getElementById('inventory-list');

            listContainer.innerHTML = `
                <p style="color:gray;font-size:12px;">
                    Loading Products...
                </p>
            `;

            try {

                const querySnapshot = await getDocs(collection(db, "products"));

                listContainer.innerHTML = '';

                let hasProducts = false;

                querySnapshot.forEach((docSnap) => {

                    const data = docSnap.data();

                    const id = docSnap.id;

                    const inStock = data.inStock !== false;

                    const itemCategory = data.category
                        ? data.category
                        : "general";

                    if (
                        selectedCategory !== "all" &&
                        itemCategory.toLowerCase() !== selectedCategory.toLowerCase()
                    ) {
                        return;
                    }

                    hasProducts = true;

                    window.allProductsData[id] = data;

                    const itemHTML = `

                        <div class="inv-item ${!inStock ? 'out-of-stock' : ''}">

                            <div class="inv-info">

                                <img src="${data.image}" class="inv-img">

                                <div>

                                    <h4 class="inv-title">${data.title}</h4>

                                    <span class="inv-price">
                                        ₹${parseFloat(data.price).toFixed(2)}
                                    </span>

                                    <div class="badge-group">

                                        <span class="status-badge catalog-badge">
                                            ${itemCategory}
                                        </span>

                                        <span class="status-badge">
                                            ${inStock ? 'Live - In Stock' : 'Out of Stock'}
                                        </span>

                                    </div>

                                </div>

                            </div>

                            <div class="inv-actions">

                                <button
                                    class="action-btn"
                                    onclick="toggleStockStatus('${id}', ${inStock})"
                                >
                                    ${inStock ? 'Mark Out of Stock' : 'Mark In Stock'}
                                </button>

                                <button
                                    class="action-btn btn-delete"
                                    onclick="deleteProduct('${id}')"
                                >
                                    Remove
                                </button>

                            </div>

                        </div>

                    `;

                    listContainer.insertAdjacentHTML('beforeend', itemHTML);

                });

                if (!hasProducts) {

                    listContainer.innerHTML = `
                        <p style="color:gray;font-size:12px;">
                            No products found in this category.
                        </p>
                    `;
                }

            } catch (error) {

                console.error(error);

                listContainer.innerHTML = `
                    <p style="color:red;font-size:12px;">
                        Error loading products.
                    </p>
                `;
            }
        };

        window.filterInventoryByCategory = function() {

            const selectedCategory = document.getElementById(
                'inventory-category-filter'
            ).value;

            loadInventory(selectedCategory);

        };

        window.toggleStockStatus = async function(docId, currentStatus) {

            try {

                const docRef = doc(db, "products", docId);

                await updateDoc(docRef, {
                    inStock: !currentStatus
                });

                const selectedCategory = document.getElementById(
                    'inventory-category-filter'
                ).value;

                loadInventory(selectedCategory);

            } catch (error) {

                alert("Error updating product.");
            }
        };

        window.deleteProduct = async function(docId) {

            if (confirm("Remove this product permanently?")) {

                try {

                    await deleteDoc(doc(db, "products", docId));

                    const selectedCategory = document.getElementById(
                        'inventory-category-filter'
                    ).value;

                    loadInventory(selectedCategory);

                } catch (error) {

                    alert("Error deleting product.");
                }
            }
        };

        loadInventory();

    </script>

</body>

</html>
