<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Dashboard</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f4; padding: 40px; }
        .admin-container { max-width: 600px; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { text-align: center; margin-bottom: 20px; color: #111; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 15px; background-color: #111; color: #fff; border: none; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; transition: 0.3s; margin-top: 10px;}
        button:hover { background-color: #333; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        .success-msg { color: green; text-align: center; font-weight: bold; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Add New Product</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Paste your Google Drive link and fill out the details to push to the live store.</p>
        
        <div class="form-group">
            <label>Product Title</label>
            <input type="text" id="prod-title" placeholder="e.g., Emerald Green Silk Abaya" required>
        </div>
        
        <div class="form-group">
            <label>Price (Numbers Only)</label>
            <input type="number" id="prod-price" placeholder="e.g., 150" required>
        </div>

        <div class="form-group">
            <label>Google Drive Image Link</label>
            <input type="text" id="prod-image-url" placeholder="Paste the 'Anyone with the link can view' URL here" required>
        </div>

        <div class="form-group">
            <label>Product Description</label>
            <textarea id="prod-desc" rows="4" placeholder="Describe the fabric, style, and fit..." required></textarea>
        </div>

        <button id="submit-btn" onclick="uploadProduct()">Push to Live Store</button>
        <p id="success-msg" class="success-msg">Product Successfully Added!</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // >>> PASTE YOUR FIREBASE KEYS HERE <<<
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Utility to convert Google Drive share links to Direct Image Links
        function convertDriveLink(url) {
            // This extracts the unique file ID from a standard Google Drive link
            const match = url.match(/\/d\/(.+?)\//);
            if (match && match[1]) {
                return `https://drive.google.com/uc?export=view&id=${match[1]}`;
            }
            // If it's already a direct link or from somewhere else, just return it
            return url; 
        }

        window.uploadProduct = async function() {
            const title = document.getElementById('prod-title').value;
            const price = parseFloat(document.getElementById('prod-price').value);
            const rawImageUrl = document.getElementById('prod-image-url').value;
            const desc = document.getElementById('prod-desc').value;
            
            const submitBtn = document.getElementById('submit-btn');
            const successMsg = document.getElementById('success-msg');

            // 1. Validation
            if(!title || !price || !rawImageUrl || !desc) {
                alert("Please fill in all fields.");
                return;
            }

            submitBtn.disabled = true;

            try {
                // 2. Convert the Drive Link
                const directImageUrl = convertDriveLink(rawImageUrl);

                // 3. Save to Firestore
                await addDoc(collection(db, "products"), {
                    title: title,
                    price: price,
                    image: directImageUrl, // We save the corrected direct link here
                    description: desc
                });

                // Show Success
                successMsg.style.display = 'block';
                submitBtn.disabled = false;
                
                // Clear the form
                document.getElementById('prod-title').value = '';
                document.getElementById('prod-price').value = '';
                document.getElementById('prod-image-url').value = '';
                document.getElementById('prod-desc').value = '';

                setTimeout(() => { successMsg.style.display = 'none'; }, 4000);

            } catch (error) {
                console.error("Error adding product: ", error);
                alert("Error adding product. Check console.");
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
