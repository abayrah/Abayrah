<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Dashboard | ABAYRAH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="star-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #FFFFFF;
            --dark-text: #1C1B1A;
            --muted-gray: #7A7571;
            --border-color: #ECEAE6;
            --accent-gold: #C5A880;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f8f8f8;
            margin: 0;
            color: var(--dark-text);
        }

        .site-header {
            background: var(--primary-bg);
            padding: 10px 40px;
            border-bottom: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: 0.5fr auto 1.5fr;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-logo-wrapper {
            display: flex;
            justify-content: center;
        }

        .brand-logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
            transform: scale(3.0);
        }

        .admin-nav {
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: flex-end;
        }

        .nav-btn {
            background: none;
            border: none;
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 11px;
            cursor: pointer;
            padding-bottom: 5px;
            color: var(--muted-gray);
            transition: 0.3s;
        }

        .nav-btn:hover {
            color: var(--dark-text);
        }

        .nav-btn.active {
            color: var(--dark-text);
            border-bottom: 1px solid var(--dark-text);
            font-weight: 500;
        }

        .logout-btn {
            background-color: transparent;
            color: #e24c4c;
            border: none;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: underline;
        }

        .admin-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-form-section {
            background: #fff;
            padding: 40px;
            border: 1px solid var(--border-color);
            display: none; /* Hidden by default to allow tab switching */
        }

        .admin-form-section.active-section {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        select,
        input,
        textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        .submit-btn {
            background: var(--dark-text);
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--muted-gray);
        }

        .inventory-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .inv-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .inv-item.out-of-stock {
            opacity: 0.7;
        }

        .inv-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .inv-img {
            width: 60px;
            height: 80px;
            object-fit: cover;
        }

        .inv-title {
            font-size: 18px;
            margin: 0;
        }

        .inv-price {
            font-size: 12px;
            color: var(--muted-gray);
        }

        .badge-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 9px;
            text-transform: uppercase;
            background: #e9f2ea;
        }

        .catalog-badge {
            background: #f0eee9;
            color: var(--accent-gold);
        }

        .inv-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-edit {
            color: var(--accent-gold);
        }

        .btn-delete {
            color: red;
        }

    </style>
</head>
<body>

    <header class="site-header">
        <div></div>
        <div class="brand-logo-wrapper">
            <img src="header.png" alt="ABAYRAH Logo" class="brand-logo-img">
        </div>
        <nav class="admin-nav">
            <button class="nav-btn active" id="tab-manage" onclick="switchTab('manage')">Manage Inventory</button>
            <button class="nav-btn" id="tab-add" onclick="switchTab('add')">Add / Edit Product</button>
        </nav>
    </header>

    <div class="admin-container">

        <!-- MANAGE INVENTORY SECTION -->
        <div id="section-manage" class="admin-form-section active-section">
            <div class="form-group" style="max-width:300px;">
                <label>Filter By Category</label>
                <select id="inventory-category-filter" onchange="filterInventoryByCategory()">
                    <option value="all">All Products</option>
                    <option value="Abayas">Abayas</option>
                    <option value="Hampers">Hampers</option>
                    <option value="Naqabs">Naqabs</option>
                    <option value="Hijabs">Hijabs</option>
                    <option value="Accessories">Accessories</option>
                </select>
            </div>
            <div id="inventory-list" class="inventory-list"></div>
        </div>

        <!-- ADD / EDIT PRODUCT SECTION -->
        <div id="section-add" class="admin-form-section">
            <h2 id="form-heading" style="margin-top:0; font-family: var(--font-serif);">Add New Product</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="edit-id" value="">
                
                <div class="form-group">
                    <label>Product Title</label>
                    <input type="text" id="prod-title" required placeholder="e.g., Luxury Silk Abaya">
                </div>

                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="prod-price" required placeholder="e.g., 2500" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="prod-category" required>
                        <option value="Abayas">Abayas</option>
                        <option value="Hampers">Hampers</option>
                        <option value="Naqabs">Naqabs</option>
                        <option value="Hijabs">Hijabs</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="prod-image" required placeholder="https://example.com/image.jpg">
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">Publish Product</button>
                <button type="button" class="submit-btn" style="background:#ECEAE6; color:#1C1B1A; display:none;" id="cancel-edit-btn" onclick="resetForm()">Cancel Edit</button>
            </form>
        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            addDoc,
            updateDoc,
            deleteDoc,
            doc
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxe9DeHRsCzD4vlNsknlDHN0w7txd51ic",
            authDomain: "abayrah-9df21.firebaseapp.com",
            projectId: "abayrah-9df21",
            storageBucket: "abayrah-9df21.firebasestorage.app",
            messagingSenderId: "789725334313",
            appId: "1:789725334313:web:b37408f42add9611730538",
            measurementId: "G-NLJJVVE32M"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.allProductsData = {};

        // 1. Tab Switching Function
        window.switchTab = function(tabName) {
            document.getElementById('section-manage').classList.remove('active-section');
            document.getElementById('section-add').classList.remove('active-section');
            document.getElementById('tab-manage').classList.remove('active');
            document.getElementById('tab-add').classList.remove('active');

            if(tabName === 'manage') {
                document.getElementById('section-manage').classList.add('active-section');
                document.getElementById('tab-manage').classList.add('active');
                filterInventoryByCategory(); // Reload to reflect any changes
            } else {
                document.getElementById('section-add').classList.add('active-section');
                document.getElementById('tab-add').classList.add('active');
            }
        };

        // 2. Load Inventory Function
        window.loadInventory = async function(selectedCategory = "all") {
            const listContainer = document.getElementById('inventory-list');
            listContainer.innerHTML = `<p style="color:gray;font-size:12px;">Loading Products...</p>`;

            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                listContainer.innerHTML = '';
                let hasProducts = false;

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const id = docSnap.id;
                    const inStock = data.inStock !== false;
                    const itemCategory = data.category ? data.category : "general";

                    // Apply Filter
                    if (selectedCategory !== "all" && itemCategory.toLowerCase() !== selectedCategory.toLowerCase()) {
                        return;
                    }

                    hasProducts = true;
                    window.allProductsData[id] = data; // Save to memory for editing

                    const itemHTML = `
                        <div class="inv-item ${!inStock ? 'out-of-stock' : ''}">
                            <div class="inv-info">
                                <img src="${data.image}" class="inv-img">
                                <div>
                                    <h4 class="inv-title">${data.title}</h4>
                                    <span class="inv-price">₹${parseFloat(data.price).toFixed(2)}</span>
                                    <div class="badge-group">
                                        <span class="status-badge catalog-badge">${itemCategory}</span>
                                        <span class="status-badge">${inStock ? 'Live - In Stock' : 'Out of Stock'}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="inv-actions">
                                <button class="action-btn" onclick="toggleStockStatus('${id}', ${inStock})">
                                    ${inStock ? 'Mark Out of Stock' : 'Mark In Stock'}
                                </button>
                                <button class="action-btn btn-edit" onclick="editProduct('${id}')">
                                    Edit
                                </button>
                                <button class="action-btn btn-delete" onclick="deleteProduct('${id}')">
                                    Remove
                                </button>
                            </div>
                        </div>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', itemHTML);
                });

                if (!hasProducts) {
                    listContainer.innerHTML = `<p style="color:gray;font-size:12px;">No products found in this category.</p>`;
                }
            } catch (error) {
                console.error(error);
                listContainer.innerHTML = `<p style="color:red;font-size:12px;">Error loading products.</p>`;
            }
        };

        // 3. Filter Function
        window.filterInventoryByCategory = function() {
            const selectedCategory = document.getElementById('inventory-category-filter').value;
            loadInventory(selectedCategory);
        };

        // 4. Save Product (Add or Edit)
        window.saveProduct = async function(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = "Saving...";
            submitBtn.disabled = true;

            const editId = document.getElementById('edit-id').value;
            const productData = {
                title: document.getElementById('prod-title').value,
                price: parseFloat(document.getElementById('prod-price').value),
                category: document.getElementById('prod-category').value,
                image: document.getElementById('prod-image').value,
                inStock: true // Defaults to true
            };

            try {
                if (editId) {
                    const docRef = doc(db, "products", editId);
                    delete productData.inStock; // Prevent overriding stock status on edit
                    await updateDoc(docRef, productData);
                    alert("Product updated successfully!");
                } else {
                    await addDoc(collection(db, "products"), productData);
                    alert("New product published successfully!");
                }
                resetForm();
                switchTab('manage'); // Automatically take user back to inventory list
            } catch (error) {
                console.error("Error saving product: ", error);
                alert("Error saving product. Check console.");
            } finally {
                submitBtn.disabled = false;
            }
        };

        // 5. Populate Edit Form
        window.editProduct = function(id) {
            const data = window.allProductsData[id];
            if(!data) return;

            document.getElementById('edit-id').value = id;
            document.getElementById('prod-title').value = data.title;
            document.getElementById('prod-price').value = data.price;
            document.getElementById('prod-category').value = data.category;
            document.getElementById('prod-image').value = data.image;

            document.getElementById('form-heading').innerText = "Edit Product: " + data.title;
            document.getElementById('submit-btn').innerText = "Update Product";
            document.getElementById('cancel-edit-btn').style.display = "block";

            switchTab('add'); // Go to the form
        };

        // 6. Reset Form
        window.resetForm = function() {
            document.getElementById('product-form').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('form-heading').innerText = "Add New Product";
            document.getElementById('submit-btn').innerText = "Publish Product";
            document.getElementById('cancel-edit-btn').style.display = "none";
        };

        // 7. Toggle Stock
        window.toggleStockStatus = async function(docId, currentStatus) {
            try {
                const docRef = doc(db, "products", docId);
                await updateDoc(docRef, { inStock: !currentStatus });
                filterInventoryByCategory(); // Refresh list
            } catch (error) {
                alert("Error updating product.");
            }
        };

        // 8. Delete Product
        window.deleteProduct = async function(docId) {
            if (confirm("Remove this product permanently?")) {
                try {
                    await deleteDoc(doc(db, "products", docId));
                    filterInventoryByCategory(); // Refresh list
                } catch (error) {
                    alert("Error deleting product.");
                }
            }
        };

        // Initialize App
        loadInventory();

    </script>
</body>
</html>
