<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABAYRAH | Admin Vault Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #FFFFFF;       
            --dark-text: #1C1B1A;        
            --muted-gray: #7A7571;       
            --border-color: #ECEAE6;     
            --accent-gold: #C5A880;      
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #FAFAFA;
            color: var(--dark-text);
            font-family: var(--font-sans);
            letter-spacing: 0.5px;
            padding: 60px 20px;
        }

        .admin-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--primary-bg);
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border-radius: 2px;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted-gray);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border-color);
            font-family: var(--font-sans);
            font-size: 13px;
            color: var(--dark-text);
            outline: none;
            background: #FFF;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            border-color: var(--accent-gold);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--dark-text);
            color: #FFFFFF;
            border: none;
            padding: 16px;
            font-size: 11px;
            font-family: var(--font-sans);
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--accent-gold);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .status-success { color: #4A5D4E; }
        .status-error { color: #E24C4C; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>Product Management</h1>
        <div class="subtitle">Add items to the ABAYRAH Catalog Vault</div>

        <form id="productForm">
            <div class="input-group">
                <label for="productCategory">Store Category Placement</label>
                <select id="productCategory" required>
                    <option value="" disabled selected>Select a collection...</option>
                    <option value="Luxury Abayas">Luxury Abayas</option>
                    <option value="Premium Niqabs">Premium Niqabs</option>
                    <option value="Essential Hijabs">Essential Hijabs</option>
                    <option value="Signature Accessories">Signature Accessories</option>
                    <option value="Curated Hampers">Curated Hampers</option>
                </select>
            </div>

            <div class="input-group">
                <label for="productTitle">Product Name / Title</label>
                <input type="text" id="productTitle" placeholder="e.g., Silk Embellished Open Abaya" required>
            </div>

            <div class="input-group">
                <label for="productPrice">Price ($ USD)</label>
                <input type="number" id="productPrice" step="0.01" placeholder="0.00" required>
            </div>

            <div class="input-group">
                <label for="productImage">Image URL Path</label>
                <input type="text" id="productImage" placeholder="e.g., images/products/abaya-silk-1.png" required>
            </div>

            <div class="input-group">
                <label for="productDesc">Product Details & Fabric Specifications</label>
                <textarea id="productDesc" placeholder="Describe the silhouette, drape dynamics, texture density, and care instructions..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Upload to Storefront Vault</button>
            <div id="statusMsg" class="status-msg"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your exact Firebase configuration parameters
        const firebaseConfig = {
           apiKey: "AIzaSyDxe9DeHRsCzD4vlNsknlDHN0w7txd51ic",
           authDomain: "abayrah-9df21.firebaseapp.com",
           projectId: "abayrah-9df21",
           storageBucket: "abayrah-9df21.firebasestorage.app",
           messagingSenderId: "789725334313",
           appId: "1:789725334313:web:b37408f42add9611730538",
           measurementId: "G-NLJJVVE32M"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const productForm = document.getElementById('productForm');
        const statusMsg = document.getElementById('statusMsg');

        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusMsg.style.display = 'none';

            const category = document.getElementById('productCategory').value;
            const title = document.getElementById('productTitle').value.trim();
            const price = parseFloat(document.getElementById('productPrice').value);
            const image = document.getElementById('productImage').value.trim();
            const description = document.getElementById('productDesc').value.trim();

            try {
                // Upload document containing the category field to Firestore
                await addDoc(collection(db, "products"), {
                    category: category,
                    title: title,
                    price: price,
                    image: image,
                    description: description,
                    createdAt: new Date()
                });

                statusMsg.className = "status-msg status-success";
                statusMsg.textContent = `"${title}" successfully saved into ${category}!`;
                statusMsg.style.display = 'block';
                productForm.reset();

            } catch (error) {
                console.error("Error writing to database: ", error);
                statusMsg.className = "status-msg status-error";
                statusMsg.textContent = "Database transaction failed. Verify configuration values.";
                statusMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
